<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Access</title>
  <style>
    :root {
      --text: #193247;
      --muted: #667785;
      --border: rgba(125, 153, 170, 0.28);
      --panel: rgba(255, 255, 255, 0.95);
      --primary: #1f8a83;
      --secondary: #bff3ec;
      --shadow: 0 22px 50px rgba(32, 77, 101, 0.12);
      --danger: #b91c1c;
      --success: #166534;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.08), transparent 26%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.1), transparent 25%),
        linear-gradient(145deg, #f0fdfa 0%, #eff6ff 100%);
      padding: 24px;
    }

    .layout {
      width: min(1280px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 28px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 34px;
      box-shadow: var(--shadow);
    }

    h1, h2 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .subtext {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
      margin: 22px 0 28px;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .option-card {
      border: 1px solid #d7e8ea;
      border-radius: 24px;
      background: white;
      padding: 30px 26px;
      display: flex;
      flex-direction: column;
      min-height: 310px;
    }

    .option-card h3 {
      margin: 0;
      font-size: 1.9rem;
    }

    .option-card p {
      margin: auto 0 28px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 16px 20px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(16, 24, 40, 0.12);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-secondary {
      background: var(--secondary);
      color: #11635d;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .link-btn {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
    }

    .workspace {
      min-height: 640px;
      display: flex;
      flex-direction: column;
    }

    .status-box {
      min-height: 28px;
      margin-top: 16px;
      font-weight: 700;
    }

    .success { color: var(--success); }
    .error { color: var(--danger); }

    .stack {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid #cfe1e4;
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      background: white;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    .card-note {
      padding: 16px 18px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .session-box {
      padding: 16px 18px;
      border-radius: 18px;
      background: #ecfeff;
      border: 1px solid #bae6fd;
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .inline-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .option-grid { grid-template-columns: 1fr; }
      .panel { padding: 24px; }
      .workspace { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="panel">
      <h1>Student Access</h1>
      <p class="subtext">Choose one option to continue into the student portal.</p>

      <div class="option-grid">
        <article class="option-card">
          <h3>Enter Token</h3>
          <p>Use this once if you are a first-time student user.</p>
          <button class="btn btn-primary" type="button" onclick="showTokenFlow()">Enter Token</button>
        </article>

        <article class="option-card">
          <h3>Login</h3>
          <p>Use your existing student username and password.</p>
          <button class="btn btn-secondary" type="button" onclick="showLoginFlow()">Login</button>
        </article>
      </div>

      <div class="top-actions">
        <button class="btn link-btn" type="button" onclick="location.href='/'">Back to Home</button>
        <button class="btn link-btn" type="button" onclick="location.href='/track.html'">Track Complaint</button>
      </div>
    </section>

    <section class="panel workspace">
      <h2 id="workspaceTitle">Complaint Form</h2>
      <p class="subtext" id="workspaceText">Login or complete token registration first to open the complaint form.</p>
      <div id="workspaceBody"></div>
      <div class="status-box" id="statusBox"></div>
    </section>
  </main>

  <script>
    const workspaceBody = document.getElementById("workspaceBody");
    const workspaceTitle = document.getElementById("workspaceTitle");
    const workspaceText = document.getElementById("workspaceText");
    const statusBox = document.getElementById("statusBox");

    function setStatus(message, type = "") {
      statusBox.textContent = message || "";
      statusBox.className = `status-box ${type}`.trim();
    }

    function render(html) {
      workspaceBody.innerHTML = html;
      setStatus("");
    }

    function showPlaceholder() {
      workspaceTitle.textContent = "Complaint Form";
      workspaceText.textContent = "Login or complete token registration first to open the complaint form.";
      render("");
    }

    function showTokenFlow() {
      workspaceTitle.textContent = "Student Token Access";
      workspaceText.textContent = "Enter the token given by the admin. After verification, create your student login once and continue.";
      render(`
        <div class="card-note">Use the exact token generated by the admin. This works only for first-time student access.</div>
        <form class="stack" id="tokenVerifyForm">
          <label>Student Token
            <input name="token" placeholder="STU-XXXXXXXX" required>
          </label>
          <button class="btn btn-primary" type="submit">Verify Token</button>
        </form>
      `);

      document.getElementById("tokenVerifyForm").addEventListener("submit", verifyToken);
    }

    async function verifyToken(event) {
      event.preventDefault();
      setStatus("Checking token...", "");
      const token = event.currentTarget.token.value.trim();

      const response = await fetch("/api/student/token/validate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      });
      const result = await response.json();

      if (!response.ok) {
        setStatus(result.error || "Token verification failed.", "error");
        return;
      }

      workspaceTitle.textContent = "Create Student Login";
      workspaceText.textContent = "This token is valid. Create your username and password once, or let the system generate them for you.";
      render(`
        <div class="card-note">Verified token: <strong>${result.token}</strong></div>
        <form class="stack" id="registerForm">
          <input type="hidden" name="token" value="${result.token}">
          <label>Choose Username
            <input name="username" placeholder="Enter username">
          </label>
          <label>Choose Password
            <input name="password" type="password" placeholder="Enter password">
          </label>
          <div class="inline-actions">
            <button class="btn btn-primary" type="submit">Create Login</button>
            <button class="btn btn-secondary" type="button" id="systemCredsBtn">Generate For Me</button>
          </div>
        </form>
      `);
      setStatus("Token verified successfully.", "success");

      document.getElementById("registerForm").addEventListener("submit", (submitEvent) => submitRegistration(submitEvent, "custom"));
      document.getElementById("systemCredsBtn").addEventListener("click", () => submitRegistration(null, "system"));
    }

    function showLoginFlow() {
      workspaceTitle.textContent = "Student Login";
      workspaceText.textContent = "Log in with the username and password you already created using your admin-issued token.";
      render(`
        <form class="stack" id="loginForm">
          <label>Username
            <input name="username" placeholder="Enter username" required>
          </label>
          <label>Password
            <input name="password" type="password" placeholder="Enter password" required>
          </label>
          <button class="btn btn-secondary" type="submit">Login</button>
        </form>
      `);

      document.getElementById("loginForm").addEventListener("submit", loginStudent);
    }

    async function submitRegistration(event, mode) {
      if (event) {
        event.preventDefault();
      }

      const form = document.getElementById("registerForm");
      const payload = {
        token: form.token.value.trim(),
        mode,
      };

      if (mode === "custom") {
        payload.username = form.username.value.trim();
        payload.password = form.password.value.trim();
      }

      setStatus("Creating student login...", "");

      const response = await fetch("/api/student/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const result = await response.json();

      if (!response.ok) {
        setStatus(result.error || "Failed to create login.", "error");
        return;
      }

      const credentialsText = result.credentials
        ? ` Username: ${result.credentials.username} | Password: ${result.credentials.password}`
        : "";
      setStatus(`Student access created successfully.${credentialsText}`, "success");
      loadComplaintForm(result.student);
    }

    async function loginStudent(event) {
      event.preventDefault();
      const form = event.currentTarget;
      setStatus("Logging in...", "");

      const response = await fetch("/api/student/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: form.username.value.trim(),
          password: form.password.value.trim(),
        }),
      });
      const result = await response.json();

      if (!response.ok) {
        setStatus(result.error || "Login failed.", "error");
        return;
      }

      setStatus("Login successful.", "success");
      loadComplaintForm(result.student);
    }

    function loadComplaintForm(student) {
      workspaceTitle.textContent = "Complaint Form";
      workspaceText.textContent = "Submit your complaint here. Your student session is active now.";
      render(`
        <div class="session-box">
          Logged in as <strong>${student.username}</strong><br>
          Token: <strong>${student.token}</strong>
          <div class="inline-actions">
            <button class="btn link-btn" type="button" id="logoutBtn">Logout</button>
          </div>
        </div>

        <form class="stack" id="complaintForm">
          <label>Complaint Title
            <input name="title" placeholder="Enter complaint title" required>
          </label>

          <label>Department
            <select name="category" required>
              <option value="">Select department</option>
              <option>Academics</option>
              <option>Canteen</option>
              <option>Lab</option>
              <option>Infrastructure</option>
              <option>Library</option>
              <option>Student Section</option>
            </select>
          </label>

          <label>Description
            <textarea name="description" placeholder="Explain the complaint clearly" required></textarea>
          </label>

          <label>Proof Upload
            <input name="proof" type="file" accept=".png,.jpg,.jpeg,.webp,.gif,.pdf,.doc,.docx,.txt">
            <small style="display:block; margin-top:8px; color:#667785;">Optional. Upload image or document proof up to 5 MB.</small>
          </label>

          <div class="inline-actions">
            <button class="btn btn-primary" type="submit">Submit Complaint</button>
            <button class="btn link-btn" type="button" onclick="location.href='/track.html'">Track Complaint</button>
          </div>
        </form>
      `);

      document.getElementById("logoutBtn").addEventListener("click", logoutStudent);
      document.getElementById("complaintForm").addEventListener("submit", submitComplaint);
    }

    async function submitComplaint(event) {
      event.preventDefault();
      const form = event.currentTarget;
      setStatus("Submitting complaint...", "");

      const body = new FormData();
      body.append("title", form.title.value.trim());
      body.append("category", form.category.value);
      body.append("description", form.description.value.trim());

      if (form.proof.files[0]) {
        body.append("proof", form.proof.files[0]);
      }

      const response = await fetch("/register-complaint", {
        method: "POST",
        body,
      });
      const result = await response.json();

      if (!response.ok) {
        setStatus(result.error || "Failed to register complaint.", "error");
        return;
      }

      form.reset();
      const proofMessage = result.file ? " Proof uploaded successfully." : "";
      setStatus(`Complaint submitted successfully. Complaint ID: ${result.id}.${proofMessage}`, "success");
    }

    async function logoutStudent() {
      await fetch("/api/student/logout", { method: "POST" });
      showPlaceholder();
      setStatus("Logged out successfully.", "success");
    }

    async function restoreSession() {
      const response = await fetch("/api/student/session");
      const result = await response.json();

      if (result.authenticated) {
        loadComplaintForm(result.student);
      } else {
        showPlaceholder();
      }
    }

    restoreSession();
  </script>
</body>
</html>
