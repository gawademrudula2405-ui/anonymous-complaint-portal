<!DOCTYPE html>
<html>
<head>
<title>Submit Complaint</title>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
width:500px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input, select, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
height:100px;
}

button{
width:100%;
padding:12px;
background:#2ecc71;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#27ae60;
}

#successBox{
margin-top:20px;
padding:15px;
background:#e8f8f5;
border-radius:6px;
display:none;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>Anonymous Complaint Form</h2>

<form id="complaintForm" enctype="multipart/form-data">

<label>Title</label>
<input type="text" name="title" required>

<br><br>

<label>Category</label>
<select name="category">
<option>Infrastructure</option>
<option>Academic</option>
<option>Hostel</option>
<option>Harassment</option>
<option>Other</option>
</select>

<br><br>

<label>Description</label>
<textarea name="description" required></textarea>

<br><br>

<label>Upload File (Optional)</label>
<input type="file" name="file">

<button type="submit">Register Complaint</button>

</form>

<div id="successBox"></div>

</div>

<script>

document.getElementById("complaintForm").addEventListener("submit", function(e){

e.preventDefault();

const formData = new FormData(this);

fetch("/register-complaint",{
method:"POST",
body:formData
})

.then(res => res.json())

.then(data => {

document.getElementById("successBox").style.display="block";

document.getElementById("successBox").innerHTML =
`
<b>Complaint Registered Successfully</b><br><br>
Your Complaint ID: <b>${data.id}</b><br>
Save this ID to track your complaint.
`;

this.reset();

});

});

</script>

</body>
</html>
