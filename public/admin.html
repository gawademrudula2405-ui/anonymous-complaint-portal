<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

button{
padding:5px 10px;
}
</style>

</head>

<body>

<h2>Admin Complaint Panel</h2>

<table id="complaintTable">

<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>File</th>
<th>Status</th>
<th>Action Taken</th>
<th>Action Date</th>
<th>Update</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

async function loadComplaints(){

const res = await fetch("/admin/complaints");
const data = await res.json();

const tbody = document.querySelector("tbody");

tbody.innerHTML="";

data.forEach(c=>{

tbody.innerHTML += `
<tr>
<td>${c.id}</td>
<td>${c.title}</td>

<td>
${c.file ? `<a href="/uploads/${c.file}" target="_blank">View File</a>` : "No File"}
</td>

<td>
<select id="status-${c.id}">
<option ${c.status=="Pending"?"selected":""}>Pending</option>
<option ${c.status=="In Progress"?"selected":""}>In Progress</option>
<option ${c.status=="Resolved"?"selected":""}>Resolved</option>
</select>
</td>

<td>
<input type="text" id="action-${c.id}" value="${c.action_taken}">
</td>

<td>
<input type="date" id="date-${c.id}" value="${c.action_date}">
</td>

<td>
<button onclick="updateComplaint('${c.id}')">Save</button>
</td>

</tr>
`;

});

}

async function updateComplaint(id){

const status = document.getElementById("status-"+id).value;
const action_taken = document.getElementById("action-"+id).value;
const action_date = document.getElementById("date-"+id).value;

await fetch("/admin/update",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id,
status,
action_taken,
action_date
})

});

alert("Updated!");

loadComplaints();

}

loadComplaints();

</script>

</body>
</html>
