<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    :root {
      --text: #2f241b;
      --muted: #7a6c61;
      --accent: #b45309;
      --accent-soft: #ffedd5;
      --panel: rgba(255, 255, 255, 0.94);
      --border: rgba(47, 36, 27, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(180, 83, 9, 0.16), transparent 28%),
        linear-gradient(145deg, #fff7ed 0%, #f8fafc 100%);
      padding: 24px;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(460px, 100%);
      background: var(--panel);
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 24px 60px rgba(47, 36, 27, 0.14);
      border: 1px solid var(--border);
    }

    .tag {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    input, button {
      font: inherit;
      border-radius: 16px;
      padding: 14px 16px;
    }

    input {
      border: 1px solid var(--border);
    }

    button {
      border: 0;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .hint {
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
    }

    .error {
      min-height: 24px;
      margin-top: 10px;
      font-weight: 600;
    }

    .back {
      display: inline-block;
      margin-top: 8px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">Admin Access</div>
    <h1>Admin Login</h1>
    <p class="hint">Log in to review complaints, resolve them, and pre-generate student tokens in bulk.</p>

    <form id="loginForm">
      <input id="u" placeholder="Username" required>
      <input id="p" type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="error" id="errorBox"></div>
    <a class="back" href="/">Back to Home</a>
  </main>

  <script>
    async function checkAdminSession() {
      const response = await fetch("/api/admin/session");
      const result = await response.json();
      if (result.authenticated) {
        location.href = "/admin/panel.html";
      }
    }

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const username = document.getElementById("u").value.trim();
      const password = document.getElementById("p").value.trim();
      const errorBox = document.getElementById("errorBox");

      const response = await fetch("/api/admin/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ username, password }),
      });
      const result = await response.json();

      if (response.ok) {
        location.href = "/admin/panel.html";
        return;
      }

      errorBox.textContent = result.error || "Invalid username or password.";
      errorBox.style.color = "#b91c1c";
    });

    checkAdminSession();
  </script>
</body>
</html>
